name: CI-CD

on:
  push:
    branches: ["master"]
  # ADICIONE ESTAS DUAS LINHAS PARA PERMITIR O ACIONAMENTO MANUAL
  workflow_dispatch:

concurrency:
  group: production-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24.14.0
  IMAGE_BACKEND: ferdinandes/carteado-backend
  IMAGE_FRONTEND: ferdinandes/carteado-frontend
  GCP_ZONE: us-central1-c
  GCP_INSTANCE_NAME: carteado-app
  DEPLOY_USER: franmlfran
  DEPLOY_PATH: /home/franmlfran
  NEXTAUTH_URL: https://carteado.ferdinandes.com.br

jobs:
  # --- Job: Detecta alterações nos diretórios ---
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'shared/**'
            frontend:
              - 'frontend/**'
              - 'shared/**'

  # --- Job 1: Instalação e Testes (requerido antes de build) ---
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node and Cache
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma Client
        run: npm run prisma:generate
      - name: Lint project
        run: npm run lint
      - name: Run tests
        run: npm run test

  # --- Job 2: Build do Backend ---
  build-backend:
    runs-on: ubuntu-latest
    needs: [setup, changes]
    # Condição atualizada: Roda se houver alterações no backend OU se o deploy for manual
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    environment: production
    permissions:
      contents: "read"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Derive image tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ env.TAG }}
            ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_BACKEND }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_BACKEND }}:buildcache,mode=max

  # --- Job 3: Build do Frontend ---
  build-frontend:
    runs-on: ubuntu-latest
    needs: [setup, changes]
    # Condição atualizada: Roda se houver alterações no frontend OU se o deploy for manual
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    environment: production
    permissions:
      contents: "read"
    steps:
      - name: Free disk space (evita "no space left" com sass-embedded)
        run: |
          docker system prune -af || true
          docker builder prune -af || true
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Derive image tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ env.TAG }}
            ${{ env.IMAGE_FRONTEND }}:latest
          build-args: |
            APP_VERSION=${{ env.TAG }}
            NEXT_PUBLIC_API_URL=${{ env.NEXTAUTH_URL }}/api/v1
            NEXT_PUBLIC_SOCKET_URL=${{ env.NEXTAUTH_URL }}
          cache-from: type=registry,ref=${{ env.IMAGE_FRONTEND }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_FRONTEND }}:buildcache,mode=max

  # --- Job 4: Deploy ---
  deploy:
    runs-on: ubuntu-latest
    needs: [setup, changes, build-backend, build-frontend]
    timeout-minutes: 30
    environment: production
    # Só faz deploy com testes OK; builds skipped (sem alterações) não contam como falha
    if: >-
      always() &&
      needs.setup.result == 'success' &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch') &&
      (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set deploy env
        run: |
          APP_VERSION="${GITHUB_SHA::7}"
          echo "APP_VERSION=${APP_VERSION}" >> $GITHUB_ENV
          echo "BACKEND_IMAGE=${{ env.IMAGE_BACKEND }}:${APP_VERSION}" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=${{ env.IMAGE_FRONTEND }}:${APP_VERSION}" >> $GITHUB_ENV
      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
      - name: Validate required deploy secrets
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GOOGLE_ID: ${{ secrets.GOOGLE_ID }}
          GOOGLE_SECRET: ${{ secrets.GOOGLE_SECRET }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        run: |
          set -e
          required=(
            DEPLOY_SSH_PRIVATE_KEY
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            GOOGLE_ID
            GOOGLE_SECRET
            NEXTAUTH_SECRET
            DATABASE_URL
            JWT_SECRET_KEY
          )
          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: ${key}" >&2
              exit 1
            fi
          done
      - name: Resolve VM public IP
        run: |
          DEPLOY_HOST=$(gcloud compute instances describe "${{ env.GCP_INSTANCE_NAME }}" --zone "${{ env.GCP_ZONE }}" --format='get(networkInterfaces[0].accessConfigs[0].natIP)')
          echo "DEPLOY_HOST=${DEPLOY_HOST}" >> "$GITHUB_ENV"
      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts
      # Gera .env no runner (indentação consistente). Heredoc dentro do SSH remoto corrompia chaves
      # (ex.: espaços antes de DATABASE_URL) e o backend não recebia a URL correta.
      - name: Write deploy/.env (secrets)
        run: |
          cat > deploy/.env << 'EOF'
          GOOGLE_ID=${{ secrets.GOOGLE_ID }}
          GOOGLE_SECRET=${{ secrets.GOOGLE_SECRET }}
          NEXTAUTH_URL=${{ env.NEXTAUTH_URL }}
          NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
          APP_VERSION=${{ env.APP_VERSION }}
          BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}
          FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}
          EOF
      - name: Deploy to VM
        run: |
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes -r ./deploy/ ${{ env.DEPLOY_USER }}@${DEPLOY_HOST}:${{ env.DEPLOY_PATH }}
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes ${{ env.DEPLOY_USER }}@${DEPLOY_HOST} << EOF
            set -euo pipefail
            on_error() {
              echo "### Falha no deploy. Coletando diagnóstico..."
              cd ${{ env.DEPLOY_PATH }}/deploy || exit 1
              docker compose -f docker-compose-prod.yml ps || true
              docker compose -f docker-compose-prod.yml logs --tail=200 backend frontend nginx || true
            }
            trap on_error ERR

            echo "### Navegando para a pasta de deploy..."
            cd ${{ env.DEPLOY_PATH }}/deploy

            echo "### Configurando rotação global de logs do Docker..."
            DESIRED_DOCKER_DAEMON='{"log-driver":"json-file","log-opts":{"max-size":"10m","max-file":"3"}}'
            if [ ! -f /etc/docker/daemon.json ] || ! sudo grep -Fq '"max-size":"10m"' /etc/docker/daemon.json || ! sudo grep -Fq '"max-file":"3"' /etc/docker/daemon.json; then
              echo "${DESIRED_DOCKER_DAEMON}" | sudo tee /etc/docker/daemon.json > /dev/null
              sudo systemctl restart docker
            fi

            echo "### Autenticando no Docker Hub..."
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            echo "### Pré-limpeza para evitar falta de espaço..."
            sudo find /var/lib/docker/containers -type f -name "*-json.log" -size +50M -exec truncate -s 0 {} \; || true
            docker image prune -af --filter "until=168h" || true
            docker builder prune -af --filter "until=168h" || true

            echo "### Puxando as imagens mais recentes..."
            docker compose -f docker-compose-prod.yml pull
            echo "### Aplicando atualização sem derrubar toda a stack..."
            docker compose -f docker-compose-prod.yml up -d --remove-orphans
            echo "### Estado dos serviços após deploy..."
            docker compose -f docker-compose-prod.yml ps
            echo ">>> DEPLOY CONCLUÍDO <<<"
          EOF
      - name: Healthcheck – verificar se a API está respondendo
        run: |
          APP_URL="${{ env.NEXTAUTH_URL }}"
          HEALTH_URL="${APP_URL}/api/v1/health"
          echo "Aguardando 15s para os containers subirem..."
          sleep 15
          for i in 1 2 3 4 5; do
            if curl -sf "${HEALTH_URL}" | grep -q '"status":"ok"'; then
              echo "Healthcheck OK: ${HEALTH_URL} respondeu."
              exit 0
            fi
            echo "Tentativa $i/5 falhou. Aguardando 10s..."
            sleep 10
          done
          echo "ERRO: Healthcheck falhou – ${HEALTH_URL} não respondeu após 5 tentativas."
          exit 1
